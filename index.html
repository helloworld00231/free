<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
</head>
<body style="margin:0;padding:0;background:#000;">
  <div id="player" style="width:100%;height:100vh;">
    <iframe 
      id="stream-frame"
      src="https://embed.st/embed/admin/ppv-iran-vs-new-zealand/1" 
      width="100%" 
      height="100%" 
      frameborder="0" 
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media"
    ></iframe>
  </div>

  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const source = params.get('source') || 'admin';
    const id = params.get('id') || 'ppv-iran-vs-new-zealand';
    const streamNo = params.get('streamNo') || '1';
    
    // Build the embed URL
    const embedUrl = `https://embed.st/embed/${source}/${id}/${streamNo}`;
    
    // Update the iframe
    document.getElementById('stream-frame').src = embedUrl;
  </script>
</body>
</html>
